name: Run npm test

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
            - run: npm install
            - run: npm test
              env:
                  # Required at build time by $env/static/private imports.
                  # E2E tests use guest mode (localStorage) so real OAuth values
                  # aren't needed. Override via GitHub Secrets for real auth testing.
                  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
                  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
                  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                  STORAGE_MONGODB_URI: ${{ secrets.STORAGE_MONGODB_URI }}
